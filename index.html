<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Climate PRO MAX</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- PWA ICON -->
<link rel="manifest" href="manifest.json">

<!-- Leaflet map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<h1>🌤️ Climate PRO MAX</h1>

<!-- 🔎 SEARCH VILLE -->
<input id="search" placeholder="🔎 Rechercher une ville">
<div id="results"></div>

<hr>

<!-- 📊 DASHBOARD -->
<div class="grid">

  <div class="card">
    🌡️ Température<br>
    <span id="temp">--</span>°C
  </div>

  <div class="card">
    💧 Humidité<br>
    <span id="hum">--</span>%
  </div>

  <div class="card">
    🌬️ Vent<br>
    <span id="wind">--</span> km/h
  </div>

  <div class="card highlight">
    🔥 Ressenti<br>
    <span id="feel">--</span>°C
  </div>

  <div class="card">
    🧠 IA confort<br>
    <span id="ai">--</span>
  </div>

</div>

<hr>

<!-- 🧠 FEEDBACK IA -->
<div>
  <h3>Ton ressenti</h3>

  <button onclick="sendFeedback(30)">🔥 Trop chaud</button>
  <button onclick="sendFeedback(22)">😌 Bien</button>
  <button onclick="sendFeedback(15)">🥶 Trop froid</button>
</div>

<hr>

<!-- 📅 PRÉVISIONS -->
<div id="today"></div>
<div id="tomorrow"></div>

<hr>

<!-- 🌍 MAP -->
<div id="map"></div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
