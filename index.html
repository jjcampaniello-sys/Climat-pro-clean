<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Climate PRO MAX</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<h1>🌤️ Climate PRO MAX</h1>

<input id="search" placeholder="🔎 Rechercher une ville">
<div id="results"></div>

<hr>

<div class="grid">

  <div class="card">🌡️ Temp<br><span id="temp">--</span></div>
  <div class="card">💧 Hum<br><span id="hum">--</span></div>
  <div class="card">🌬️ Vent<br><span id="wind">--</span></div>
  <div class="card highlight">🔥 Ressenti<br><span id="feel">--</span></div>

</div>

<hr>

<div>
  <h3>🧠 IA feedback</h3>
  <button onclick="sendFeedback(30)">🔥 Chaud</button>
  <button onclick="sendFeedback(22)">😌 OK</button>
  <button onclick="sendFeedback(15)">🥶 Froid</button>
</div>

<hr>

<div id="today"></div>
<div id="tomorrow"></div>

<div id="map" style="height:300px;"></div>

<script src="app.js"></script>

</body>
</html>
