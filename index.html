<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Climate PRO MAX</title>

<link rel="stylesheet" href="style.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- Leaflet MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>🌤️ Climate PRO MAX</h1>

<!-- 🔎 SEARCH -->
<input id="search" placeholder="🔎 Rechercher une ville">
<div id="results"></div>

<!-- 📊 DASHBOARD -->
<div class="grid">

  <div class="card">🌡️ Temp<br><span id="temp">--</span>°C</div>
  <div class="card">💧 Humidité<br><span id="hum">--</span>%</div>
  <div class="card">🌬️ Vent<br><span id="wind">--</span> km/h</div>
  <div class="card highlight">🔥 Ressenti<br><span id="feels">--</span>°C</div>
  <div class="card">🧠 IA<br><span id="comfort">--</span></div>

</div>

<!-- 📊 HISTORIQUE -->
<div id="history"></div>

<!-- 📈 CHART -->
<canvas id="chart"></canvas>

<!-- 🌍 MAP -->
<div id="map"></div>

<script src="app.js"></script>

</body>
</html>
