<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Climate PRO ++</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<h1>🌤️ Climate PRO ++</h1>

<!-- 🔎 GOOGLE LIKE SEARCH -->
<input id="search" placeholder="🔎 Rechercher une ville">
<div id="results"></div>

<hr>

<!-- 📍 LOCALISATION -->
<button onclick="useGPS()">📍 Ma position</button>

<hr>

<!-- 📊 DASHBOARD -->
<div class="grid">

  <div>🌡️ Temp réelle<br><b id="temp">--</b>°C</div>
  <div>🔥 Ressenti<br><b id="feel">--</b>°C</div>
  <div>💧 Humidité<br><b id="hum">--</b>%</div>
  <div>🌬️ Vent<br><b id="wind">--</b> km/h</div>
  <div>🧭 Direction<br><b id="dir">--</b></div>

</div>

<hr>

<!-- 🧠 IA FEEDBACK -->
<h3>Ton ressenti</h3>
<button onclick="feedback(30)">🔥 Chaud</button>
<button onclick="feedback(22)">😌 OK</button>
<button onclick="feedback(15)">🥶 Froid</button>

<hr>

<!-- 📅 PREVISIONS -->
<div id="forecast"></div>
<div id="tomorrow"></div>

<hr>

<!-- 🌍 MAP -->
<div id="map" style="height:300px;"></div>

<script src="app.js"></script>

</body>
</html>
