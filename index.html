<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Climate Pro ++</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet (carte) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="top">
  <h1>🌤️ Climate Pro ++</h1>
  <div id="mode">--</div>
</div>

<div class="glass-grid">

  <div class="card">
    🌡️ Température<br>
    <span id="temp">--</span>°C
  </div>

  <div class="card">
    💧 Humidité<br>
    <span id="hum">--</span>%
  </div>

  <div class="card">
    🌬️ Vent<br>
    <span id="wind">--</span> km/h
  </div>

  <div class="card highlight">
    🔥 Ressenti<br>
    <span id="feels">--</span>°C
  </div>

  <div class="card">
    🧠 IA confort<br>
    <span id="comfort">--</span>
  </div>

</div>

<div id="alert"></div>

<!-- 📊 Graph -->
<canvas id="chart"></canvas>

<!-- 🌍 MAP -->
<div id="map"></div>

<!-- 📜 HISTORY -->
<div id="history"></div>

<script src="app.js"></script>

</body>
</html>
